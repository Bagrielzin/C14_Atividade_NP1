name: CI/CD Pipeline Oficial

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # 1. JOB DE TESTES
  test:
    name: Executar Testes Unitários
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar testes e gerar relatório
        run: |
          echo "Executando testes..."
          pytest -v > test-report.txt || true

      - name: Armazenar relatório de testes como Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: test-report.txt

  # 2. JOB DE BUILD
  build:
    name: Build e Empacotamento
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Gerar pacote distribuível
        run: |
          echo "Compilando e gerando pacote..."
          mkdir -p dist
          git archive --format=zip --output=dist/pacote-projeto.zip HEAD

      - name: Armazenar pacote como Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacote-distribuivel
          path: dist/pacote-projeto.zip

  # 3. JOB DE DEPLOY
  deploy:
    name: Publicar Release de Artefatos
    runs-on: ubuntu-latest
    needs: [test, build]
    permissions:
      contents: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Baixar Pacote do Build
        uses: actions/download-artifact@v4
        with:
          name: pacote-distribuivel
          path: ./dist

      - name: Baixar Relatório de Testes
        uses: actions/download-artifact@v4
        with:
          name: relatorio-testes
          path: ./reports

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release ${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            dist/pacote-projeto.zip
            reports/test-report.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 4. JOB DE NOTIFICAÇÃO
  notify:
    name: Enviar Notificação
    runs-on: ubuntu-latest
    if: always()
    needs: [test, build, deploy]

    env:
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_NOTIFICATION }}
      PIPELINE_STATUS: ${{ needs.deploy.result }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Executar script de envio de email
        run: python notify.py